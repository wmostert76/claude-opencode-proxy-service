name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: |
          VERSION="$(cat VERSION)"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${VERSION}" -o "claude-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/claude-go/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: claude-go-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p dist
          find artifacts -name 'claude-go-*' -exec cp {} dist/ \;
          ls -lh dist/

      - name: Resolve version
        id: version
        run: |
          base="$(cat VERSION)"
          short_sha="${GITHUB_SHA::7}"
          tag="v${base}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          BASE: ${{ steps.version.outputs.base }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          previous="$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')"
          if [[ -n "$previous" ]]; then
            changes="$(git log --pretty='- %s (%h)' "${previous}..${GITHUB_SHA}")"
          else
            changes="$(git log --pretty='- %s (%h)' -n 20)"
          fi

          cat > release-notes.md <<NOTES
          ## Claude Go v${BASE}

          ### Install

          **Linux / macOS:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/bootstrap.sh | bash
          claude-go install
          claude-go --api <key>
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/bootstrap.ps1 | iex
          claude-go install
          claude-go --api <key>
          \`\`\`

          ### Changes

          ${changes}
          NOTES

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file release-notes.md \
            dist/*

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create commit release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          base="$(cat VERSION)"
          short_sha="${GITHUB_SHA::7}"
          tag="v${base}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          BASE: ${{ steps.version.outputs.base }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "Automated release for commit \`$GITHUB_SHA\`.

          Base version: \`$BASE\`
          Commit: \`$GITHUB_SHA\`

          Install:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/bootstrap.sh | bash
          \`\`\`"

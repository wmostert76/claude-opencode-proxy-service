name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create commit release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          base="$(cat VERSION)"
          short_sha="${GITHUB_SHA::7}"
          tag="v${base}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          BASE: ${{ steps.version.outputs.base }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          previous="$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')"
          if [[ -n "$previous" ]]; then
            changes="$(git log --pretty='- %s (%h)' "${previous}..${GITHUB_SHA}")"
          else
            changes="$(git log --pretty='- %s (%h)' -n 20)"
          fi

          cat > release-notes.md <<NOTES
          ## Claude Go v${BASE}

          Automated release for commit \`${GITHUB_SHA}\`.

          ### Install

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/bootstrap.sh | bash
          claude setup
          \`\`\`

          ### Changes

          ${changes}

          ### Useful Commands

          \`\`\`bash
          claude doctor
          claude status
          claude logs
          claude models --test
          claude update
          \`\`\`
          NOTES

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file release-notes.md
